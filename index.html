<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a84ff" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Punkte" />
<title>Lukify's 🦖 Punkte</title>
<meta name="description" content="Belohnungs- und Punkte-App für Kinder – Sterne sammeln, Aufgaben erledigen, Belohnungen freischalten." />
<style>
  :root{
    --txt:#0b0b0d; --muted:#3a3a3f; --accent:#0a84ff;
    --card:rgba(255,255,255,0.80); --fill:rgba(118,118,128,0.12); --fill2:rgba(118,118,128,0.20);
    --border:rgba(0,0,0,0.09); --sep:rgba(0,0,0,0.07);
    --earn:#34c759; --spend:#ff3b30; --gold:#ff9f0a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",system-ui,Arial,sans-serif;
    color:var(--txt);overflow:hidden;
    background:
      radial-gradient(130% 90% at 12% -10%, rgba(255,255,255,.42), transparent 55%),
      linear-gradient(160deg,#5eead4 0%, #2dd4bf 20%, #22d3ee 40%, #0a84ff 72%, #0061dd 100%);
    background-attachment:fixed;
  }
  .display{font-weight:700;letter-spacing:-.01em;}

  .wrap{max-width:480px;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative;
    background:rgba(255,255,255,0.18);backdrop-filter:blur(34px) saturate(170%);-webkit-backdrop-filter:blur(34px) saturate(170%);}

  .titlebar{display:flex;align-items:center;gap:10px;padding:0 14px;height:calc(46px + env(safe-area-inset-top));
    padding-top:env(safe-area-inset-top);border-bottom:1px solid var(--sep);position:relative;flex:0 0 auto;
    background:rgba(255,255,255,0.22);backdrop-filter:blur(24px) saturate(185%);-webkit-backdrop-filter:blur(24px) saturate(185%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.6);}
  .lights{display:flex;gap:8px;z-index:2;}
  .lights span{width:12px;height:12px;border-radius:50%;box-shadow:0 0 0 .5px rgba(0,0,0,.06) inset;}
  .red{background:#ff5f57;} .yellow{background:#febc2e;} .green{background:#28c840;}
  .wintitle{position:absolute;left:0;right:0;top:env(safe-area-inset-top);height:46px;display:flex;align-items:center;justify-content:center;
    font-weight:600;font-size:14px;color:var(--txt);pointer-events:none;}
  .winbtns{margin-left:auto;display:flex;gap:8px;z-index:2;}
  .iconbtn{height:30px;width:30px;border:none;border-radius:50%;background:rgba(255,255,255,.28);color:var(--txt);font-size:15px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.12s;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:inset 0 1px 0 rgba(255,255,255,.7),0 1px 2px rgba(0,0,0,.1);}
  .iconbtn:active{transform:scale(.9);}

  .toolbar{padding:8px 18px 0;flex:0 0 auto;}
  .toolbar #subtitle{font-size:12px;color:var(--muted);font-weight:600;}

  main{flex:1;overflow-y:auto;padding:8px 18px 122px;}

  .orbwrap{display:flex;flex-direction:column;align-items:center;padding-top:10px;}
  .orb{position:relative;height:172px;width:172px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 34px rgba(0,0,0,.14);}
  .orb .inner{height:140px;width:140px;border-radius:50%;background:radial-gradient(circle at 34% 28%,rgba(255,255,255,.9),rgba(255,255,255,.3) 48%,rgba(255,255,255,.2) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;
    backdrop-filter:blur(22px) saturate(195%);-webkit-backdrop-filter:blur(22px) saturate(195%);border:1px solid rgba(255,255,255,.6);
    box-shadow:inset 0 3px 6px rgba(255,255,255,.95),inset 0 -14px 24px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.08);}
  .orb .num{font-weight:700;font-size:50px;color:var(--txt);line-height:1;letter-spacing:-.02em;}
  .orb .num.pop{animation:pop .4s ease-out;}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.22)}100%{transform:scale(1)}}
  .orb .lbl{color:var(--muted);font-weight:600;font-size:13px;margin-top:3px;}
  .badges{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
  .pill{font-size:13px;font-weight:600;padding:5px 12px;border-radius:999px;background:linear-gradient(155deg,rgba(255,255,255,.5),rgba(255,255,255,.22));border:1px solid rgba(255,255,255,.5);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:inset 0 1px 0 rgba(255,255,255,.9);}
  .pill.fire{background:rgba(255,159,10,.16);color:#c93400;}
  .pill.pending{background:rgba(10,132,255,.14);color:var(--accent);}
  .badge{position:absolute;top:-6px;right:-9px;background:var(--spend);color:#fff;font-size:10px;font-weight:700;
    min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;box-shadow:0 1px 3px rgba(0,0,0,.3);}
  .row.pending{opacity:.7;}
  .tag{font-size:10px;font-weight:700;color:var(--accent);background:rgba(10,132,255,.12);padding:1px 6px;border-radius:6px;margin-left:6px;}
  .hint{font-size:12px;color:var(--muted);margin-top:8px;font-weight:600;text-align:center;}
  .hint.earn{color:#248a3d;}

  .card{border-radius:16px;background:linear-gradient(155deg,rgba(255,255,255,.42),rgba(255,255,255,.18));border:1px solid rgba(255,255,255,.65);padding:16px;
    backdrop-filter:blur(30px) saturate(200%);-webkit-backdrop-filter:blur(30px) saturate(200%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.9),inset 0 -14px 26px rgba(0,0,0,.05),0 12px 30px rgba(0,0,0,.13);}
  .sectiontitle{font-weight:700;font-size:17px;letter-spacing:-.01em;margin:0 0 10px;}
  .rowbetween{display:flex;align-items:center;justify-content:space-between;}
  .cathead{font-weight:700;font-size:11px;margin:8px 0 8px;display:flex;align-items:center;gap:7px;letter-spacing:.6px;text-transform:uppercase;}
  .catdot{display:inline-block;width:9px;height:9px;border-radius:50%;}

  .bar{height:9px;border-radius:999px;background:var(--fill);overflow:hidden;}
  .bar>span{display:block;height:100%;border-radius:999px;background:var(--accent);transition:width .5s;}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .qbtn{border:1px solid rgba(255,255,255,.6);border-radius:16px;padding:14px;text-align:left;cursor:pointer;transition:.12s;color:var(--txt);
    backdrop-filter:blur(28px) saturate(200%);-webkit-backdrop-filter:blur(28px) saturate(200%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.88),inset 0 -12px 22px rgba(0,0,0,.04),0 8px 20px rgba(0,0,0,.11);}
  .qbtn:active{transform:scale(.96);}
  .qbtn .e{font-size:23px;}
  .qbtn .t{font-size:14px;font-weight:600;line-height:1.2;margin:8px 0 6px;min-height:36px;}
  .qbtn .p{font-weight:700;font-size:14px;}
  .dashed{margin-top:12px;width:100%;border:1.5px dashed var(--border);background:rgba(255,255,255,.4);border-radius:16px;padding:12px;color:var(--muted);font-weight:600;font-size:14px;cursor:pointer;}
  .dashed:hover{color:var(--txt);}

  .row{display:flex;align-items:center;gap:12px;border:1px solid rgba(255,255,255,.55);border-radius:14px;background:linear-gradient(155deg,rgba(255,255,255,.4),rgba(255,255,255,.15));padding:10px 12px;
    backdrop-filter:blur(26px) saturate(200%);-webkit-backdrop-filter:blur(26px) saturate(200%);box-shadow:inset 0 1px 0 rgba(255,255,255,.88),inset 0 -10px 18px rgba(0,0,0,.04),0 5px 14px rgba(0,0,0,.08);}
  .row .e{font-size:24px;}
  .row .t{flex:1;font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .v{font-weight:700;font-size:14px;}
  .v.earn{color:#248a3d;} .v.spend{color:#c4342b;} .v.gold{color:#b26a00;}
  .minibtn{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:2px 4px;}
  .minibtn:hover{color:var(--txt);}

  .reward{border-radius:14px;border:1px solid rgba(255,255,255,.55);background:linear-gradient(155deg,rgba(255,255,255,.4),rgba(255,255,255,.15));padding:14px;
    backdrop-filter:blur(28px) saturate(200%);-webkit-backdrop-filter:blur(28px) saturate(200%);box-shadow:inset 0 1px 0 rgba(255,255,255,.88),inset 0 -12px 22px rgba(0,0,0,.04),0 8px 20px rgba(0,0,0,.11);}
  .reward.can{background:linear-gradient(155deg,rgba(255,255,255,.58),rgba(255,255,255,.3));}
  .cta{padding:8px 15px;border:none;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;transition:.12s;}
  .cta:active{transform:scale(.95);}
  .cta.on{background:var(--accent);color:#fff;}
  .cta.off{background:var(--fill);color:var(--muted);}

  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
  .stat{border-radius:14px;padding:12px;}
  .stat.earn{background:rgba(52,199,89,.13);border:1px solid rgba(52,199,89,.28);}
  .stat.spend{background:rgba(255,59,48,.13);border:1px solid rgba(255,59,48,.28);}
  .stat .k{font-size:12px;font-weight:700;} .stat.earn .k{color:#248a3d;} .stat.spend .k{color:#c4342b;}
  .stat .val{font-weight:700;font-size:20px;letter-spacing:-.01em;}
  .daylabel{font-size:12px;font-weight:700;color:var(--muted);margin:14px 2px 8px;}

  .cal{max-width:460px;margin:0 auto 18px;}
  .calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .calhead b{font-weight:700;font-size:16px;text-transform:capitalize;letter-spacing:-.01em;}
  .calnav{height:32px;width:32px;border:none;border-radius:9px;background:var(--fill);color:var(--txt);font-size:18px;font-weight:700;cursor:pointer;line-height:1;}
  .calnav:active{transform:scale(.9);}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .calgrid .wd{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding-bottom:2px;}
  .cell{aspect-ratio:1/1;min-height:34px;border-radius:9px;background:var(--fill);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);border:2px solid transparent;cursor:pointer;}
  .cell.empty{background:none;border:none;cursor:default;}
  .cell.e1{background:#dbefff;color:#0a4d7a;}
  .cell.e2{background:#9bd6ff;color:#063f63;}
  .cell.e3{background:#bff0d0;color:#10643c;}
  .cell.e4{background:#ffe3ad;color:#7a4a06;}
  .cell.earned .cp{font-size:9px;font-weight:700;margin-top:-1px;}
  .cell.today{border-color:var(--accent);}

  .empty{text-align:center;padding:40px 20px;}
  .empty .e{font-size:46px;opacity:.7;} .empty p{color:var(--muted);font-weight:600;font-size:14px;margin-top:10px;}

  .field{width:100%;border-radius:11px;background:#fff;border:1px solid var(--border);padding:11px 12px;color:var(--txt);font-family:inherit;font-weight:600;font-size:15px;outline:none;}
  .field:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(10,132,255,.15);}
  label.lbl{font-size:12px;font-weight:700;color:var(--muted);}

  .reset{width:100%;border:1px solid rgba(255,59,48,.4);color:var(--spend);background:rgba(255,255,255,.5);border-radius:14px;padding:13px;font-weight:600;font-size:14px;cursor:pointer;}
  .reset:hover{background:rgba(255,59,48,.08);}
  .ghostbtn{width:100%;border:1px solid rgba(255,255,255,.45);background:rgba(255,255,255,.32);color:var(--txt);border-radius:14px;padding:13px;font-weight:600;font-size:14px;cursor:pointer;
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:inset 0 1px 0 rgba(255,255,255,.6);}
  .ghostbtn:hover{background:rgba(255,255,255,.5);}
  .note{text-align:center;font-size:12px;color:var(--muted);}

  .appbtn{border:none;border-radius:10px;width:36px;height:36px;font-size:16px;font-weight:700;cursor:pointer;margin-left:4px;}
  .appbtn:active{transform:scale(.9);}
  .appbtn.ok{background:var(--earn);color:#fff;} .appbtn.no{background:var(--spend);color:#fff;}

  nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:5;padding-bottom:env(safe-area-inset-bottom);}
  .dock{margin:0 12px 12px;display:flex;justify-content:center;gap:6px;padding:8px 10px;border-radius:22px;
    background:linear-gradient(160deg,rgba(255,255,255,.42),rgba(255,255,255,.18));backdrop-filter:blur(42px) saturate(200%);-webkit-backdrop-filter:blur(42px) saturate(200%);
    border:1px solid rgba(255,255,255,.72);box-shadow:inset 0 1px 0 rgba(255,255,255,.95),inset 0 -10px 18px rgba(0,0,0,.04),0 12px 38px rgba(0,0,0,.22);}
  .dockitem{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:0;}
  .dockicon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:23px;
    background:linear-gradient(160deg,rgba(255,255,255,.8),rgba(231,235,242,.5));box-shadow:inset 0 1px 0 rgba(255,255,255,.9),0 2px 6px rgba(0,0,0,.16),0 0 0 .5px rgba(0,0,0,.04);transition:transform .14s;}
  .dockitem.act .dockicon{transform:translateY(-3px) scale(1.06);box-shadow:0 5px 12px rgba(0,0,0,.22);}
  .dlabel{font-size:9px;font-weight:600;color:#1d1d1f;}
  .dockitem.act .dlabel{color:var(--accent);}
  .rundot{width:4px;height:4px;border-radius:50%;background:#1d1d1f;opacity:0;}
  .dockitem.act .rundot{opacity:.5;}

  .overlay{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.4);backdrop-filter:blur(2px);display:flex;align-items:flex-end;justify-content:center;animation:fade .2s ease-out;}
  @media(min-width:480px){.overlay{align-items:center;}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{width:100%;max-width:480px;background:linear-gradient(180deg,rgba(255,255,255,.55),rgba(248,249,251,.48));backdrop-filter:blur(54px) saturate(200%);-webkit-backdrop-filter:blur(54px) saturate(200%);
    border-top:1px solid rgba(255,255,255,.8);border-radius:22px 22px 0 0;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));animation:up .25s ease-out;box-shadow:inset 0 1px 0 rgba(255,255,255,.95),0 -10px 44px rgba(0,0,0,.2);}
  @media(min-width:480px){.sheet{border-radius:22px;border:1px solid var(--border);}}
  @keyframes up{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
  .sheet h3{font-weight:700;font-size:18px;margin-bottom:16px;letter-spacing:-.01em;}
  .emojirow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;max-height:160px;overflow-y:auto;padding-right:2px;}
  .emojirow button{height:40px;width:40px;border-radius:11px;background:var(--fill);border:2px solid transparent;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .emojirow button.sel{background:rgba(10,132,255,.16);border-color:var(--accent);}
  .catrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
  .catrow .catchip{padding:8px 12px;border:1px solid var(--border);border-radius:999px;background:var(--fill);color:var(--txt);font-weight:600;font-size:13px;cursor:pointer;}
  .signrow{display:flex;gap:8px;margin-bottom:18px;}
  .signrow button{flex:1;padding:10px;border:none;border-radius:11px;font-weight:600;font-size:14px;cursor:pointer;background:var(--fill);color:var(--muted);}
  .signrow button.selearn{background:var(--earn);color:#fff;}
  .signrow button.selspend{background:var(--spend);color:#fff;}
  .stepper{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:22px;}
  .stepper button{height:46px;width:46px;border-radius:50%;border:none;background:var(--fill);color:var(--txt);font-size:24px;font-weight:700;cursor:pointer;}
  .stepper button:active{transform:scale(.9);}
  .stepper .sv{font-weight:700;font-size:30px;color:var(--accent);min-width:84px;text-align:center;letter-spacing:-.01em;}
  .primary{width:100%;border:none;border-radius:14px;background:var(--accent);color:#fff;padding:14px;font-weight:600;font-size:15px;cursor:pointer;}
  .primary:disabled{background:var(--fill);color:var(--muted);}
  .primary:active{transform:scale(.97);}
  .confirmbtns{display:flex;gap:12px;}
  .confirmbtns button{flex:1;border:none;border-radius:14px;padding:13px;font-weight:600;font-size:15px;cursor:pointer;}
  .btn-cancel{background:var(--fill);color:var(--txt);}
  .btn-amber{background:var(--accent);color:#fff;}
  .btn-rose{background:var(--spend);color:#fff;}
  .center{text-align:center;}
  .bigemoji{font-size:46px;margin-bottom:12px;}
  .subtxt{color:var(--muted);font-size:14px;margin-top:8px;font-weight:500;}

  .pindots{display:flex;gap:14px;justify-content:center;margin:14px 0 4px;}
  .pindots .dot{width:14px;height:14px;border-radius:50%;background:var(--fill2);border:1px solid var(--border);}
  .pindots .dot.on{background:var(--accent);border-color:var(--accent);}
  .pindots.shake{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px;}
  .keypad button{padding:15px;border:none;border-radius:14px;background:var(--fill);color:var(--txt);font-weight:600;font-size:22px;cursor:pointer;}
  .keypad button:active{transform:scale(.94);}
  .keypad button.blank{background:none;cursor:default;}

  .card,.qbtn,.reward{position:relative;overflow:hidden;}
  .card::before,.qbtn::before,.reward::before{content:"";position:absolute;top:0;left:-70%;width:55%;height:100%;
    background:linear-gradient(105deg,transparent 0%,rgba(255,255,255,.42) 50%,transparent 100%);
    transform:skewX(-18deg);pointer-events:none;animation:sheen 7s ease-in-out infinite;}
  .card::before{animation-delay:.4s;}
  .qbtn:nth-child(2n)::before{animation-delay:1.4s;}
  .qbtn:nth-child(3n)::before{animation-delay:2.6s;}
  .reward:nth-of-type(2n)::before{animation-delay:1.1s;}
  @keyframes sheen{0%{left:-70%}14%{left:145%}100%{left:145%}}

  #fx{position:fixed;inset:0;z-index:50;pointer-events:none;overflow:hidden;}
  .conf{position:absolute;top:-10%;animation:conf linear forwards;}
  @keyframes conf{0%{transform:translateY(0) translateX(0) rotate(0);opacity:1}100%{transform:translateY(112vh) translateX(var(--dx)) rotate(540deg);opacity:0}}
  .float{position:absolute;left:50%;top:42%;transform:translateX(-50%);font-weight:700;font-size:44px;text-shadow:0 4px 18px rgba(0,0,0,.25);animation:fl 1.1s ease-out forwards;}
  @keyframes fl{0%{transform:translate(-50%,20px) scale(.6);opacity:0}25%{transform:translate(-50%,-10px) scale(1.1);opacity:1}70%{transform:translate(-50%,-40px) scale(1);opacity:1}100%{transform:translate(-50%,-90px) scale(.9);opacity:0}}
  .toast{position:absolute;top:calc(58px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);background:rgba(30,30,32,.92);color:#fff;font-weight:600;padding:11px 18px;border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:fade .2s ease-out;max-width:90%;text-align:center;}
  @media(prefers-reduced-motion:reduce){.conf,.float,.num.pop,.card::before,.qbtn::before,.reward::before{animation:none!important;}}

  /* ===== Tablet ===== */
  @media (min-width:700px){
    .wrap{max-width:720px;}
    nav{max-width:720px;}
    main{padding:10px 28px 134px;}
    .grid{grid-template-columns:repeat(3,1fr);}
    .orb{height:196px;width:196px;}
    .orb .inner{height:160px;width:160px;}
    .orb .num{font-size:58px;}
    .orb .lbl{font-size:14px;}
    .sectiontitle{font-size:19px;}
    .wintitle{font-size:15px;}
    .toolbar #subtitle{font-size:13px;}
    .qbtn .t{font-size:15px;}
    .row .t,.v{font-size:15px;}
    .twocol{gap:14px;}
    .dock{gap:10px;padding:10px 14px;border-radius:26px;}
    .dockicon{width:54px;height:54px;font-size:26px;border-radius:15px;}
    .dlabel{font-size:11px;}
    .cell{min-height:42px;font-size:13px;}
    .sheet{max-width:560px;}
  }
  @media (min-width:1024px){
    .wrap{max-width:900px;}
    nav{max-width:900px;}
    .grid{grid-template-columns:repeat(4,1fr);}
    main{padding:12px 36px 140px;}
  }
  @media (min-width:1280px){
    .wrap{max-width:980px;}

function load(){
  try{ var raw=localStorage.getItem(KEY); if(raw){ return Object.assign({},DEFAULT,JSON.parse(raw)); } }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT));
}
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){} }
function uid(){ return Math.random().toString(36).slice(2,9); }
function esc(s){ return String(s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }
function dayKey(d){ d=d||new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }

function isApproved(t){ return t.status!=="pending"; }
function approvedTx(){ return state.transactions.filter(isApproved); }
function pendingTx(){ return state.transactions.filter(function(t){return t.status==="pending";}); }
function balance(){ return approvedTx().reduce(function(s,t){return s+t.points;},0); }
function lifetime(){ return approvedTx().filter(function(t){return t.points>0;}).reduce(function(s,t){return s+t.points;},0); }
function levelInfo(){
  var lt=lifetime(), idx=0;
  for(var i=0;i<LEVELS.length;i++){ if(lt>=LEVELS[i].min) idx=i; }
  var cur=LEVELS[idx], next=LEVELS[idx+1]||null;
  var prog = next ? Math.min(1,(lt-cur.min)/(next.min-cur.min)) : 1;
  return {cur:cur,next:next,prog:prog,lt:lt};
}
function streak(){
  var days={};
  approvedTx().filter(function(t){return t.points>0;}).forEach(function(t){ days[dayKey(new Date(t.date))]=1; });
  var cur=new Date(); if(!days[dayKey(cur)]) cur.setDate(cur.getDate()-1);
  var s=0; while(days[dayKey(cur)]){ s++; cur.setDate(cur.getDate()-1); } return s;
}
function earnedToday(){ var tk=dayKey(); return approvedTx().filter(function(t){return dayKey(new Date(t.date))===tk&&t.points>0;}).reduce(function(s,t){return s+t.points;},0); }
function pendingEarn(){ return pendingTx().filter(function(t){return t.points>0;}).reduce(function(s,t){return s+t.points;},0); }
function nextReward(){ var b=balance(), sorted=state.rewards.slice().sort(function(a,c){return a.cost-c.cost;}); return sorted.find(function(r){return r.cost>b;})||sorted[sorted.length-1]||null; }

function tone(kind){
  if(state.muted) return;
  try{
    var Ctx=window.AudioContext||window.webkitAudioContext; if(!Ctx) return;
    audioCtx=audioCtx||new Ctx(); if(audioCtx.state==="suspended") audioCtx.resume();
    var notes = kind==="reward"?[523,659,784,1047]:kind==="spend"?[392,294]:[523,784];
    notes.forEach(function(f,i){
      var o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type="sine";
      o.connect(g); g.connect(audioCtx.destination);
      var t0=audioCtx.currentTime+i*0.09; o.frequency.setValueAtTime(f,t0);
      g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(0.16,t0+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t0+0.18);
      o.start(t0); o.stop(t0+0.2);
    });
  }catch(e){}
}
function confetti(kind){

  for(var i=0;i<28;i++){
    var s=document.createElement("span"); s.className="conf"; s.textContent=set[i%set.length];
    var dur=0.9+Math.random()*0.6;
    s.style.left=(Math.random()*100)+"%"; s.style.fontSize=(14+Math.random()*18)+"px";
    s.style.animationDelay=(Math.random()*0.25)+"s"; s.style.animationDuration=dur+"s"; s.style.setProperty("--dx",((Math.random()-0.5)*80)+"px");
    fx.appendChild(s);
    (function(node){ setTimeout(function(){ node.remove(); }, (dur+0.4)*1000); })(s);
  }
}
function floatPts(points){

}

function addTx(o){
  var status = o.status || (unlocked ? "approved" : "pending");
  state.transactions.push({id:uid(),date:new Date().toISOString(),emoji:o.emoji,label:o.label,points:o.points,kind:o.kind,status:status});
  save();
  if(status==="pending"){ if(o.points>0) floatPending(o.points); toast("⏳ Zur Freigabe gesendet!"); }
  else { var k = o.kind==="reward"?"reward":(o.points>=0?"earn":"spend"); popNext=true; confetti(k); floatPts(o.points); tone(k); }
  render();
}
function redeem(r){
  if(unlocked){ if(balance()<r.cost){ toast("Nicht genug Sterne"); return; } addTx({emoji:r.emoji,label:r.name,points:-r.cost,kind:"reward",status:"approved"}); toast("🎉 "+r.name+" eingelöst!"); }
  else { addTx({emoji:r.emoji,label:"Wunsch: "+r.name,points:-r.cost,kind:"reward"}); }
}
function approveTx(id){ var t=state.transactions.find(function(x){return x.id===id;}); if(!t) return; t.status="approved"; t.approvedDate=new Date().toISOString(); save();
  var k = t.kind==="reward"?"reward":(t.points>=0?"earn":"spend"); popNext=true; confetti(k); tone(k); render(); }
function rejectTx(id){ state.transactions=state.transactions.filter(function(x){return x.id!==id;}); save(); render(); }

function delQuick(id){ state.quickActions=state.quickActions.filter(function(q){return q.id!==id;}); save(); render(); }
function saveReward(it){ var ex=state.rewards.some(function(r){return r.id===it.id;}); state.rewards= ex? state.rewards.map(function(r){return r.id===it.id?it:r;}) : state.rewards.concat([it]); save(); render(); }
function delReward(id){ state.rewards=state.rewards.filter(function(r){return r.id!==id;}); save(); render(); }

function hashPin(p){ var h=5381; for(var i=0;i<p.length;i++){ h=((h<<5)+h+p.charCodeAt(i))>>>0; } return "h"+h; }
function lock(){ unlocked=false; if(tab==="aprovar"||tab==="ajustes") tab="inicio"; render(); }
function requireUnlock(target){

}

function exportData(){
  try{
    var blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var d=new Date(), stamp=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    var a=document.createElement("a"); a.href=url; a.download="lukify-punkte-backup-"+stamp+".json";
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); },120);
    toast("✅ Backup gespeichert");
  }catch(e){ toast("Backup fehlgeschlagen"); }
}
function importData(){
  var inp=document.createElement("input"); inp.type="file"; inp.accept="application/json,.json"; inp.style.display="none";
  document.body.appendChild(inp);
  inp.addEventListener("change",function(){
    var f=inp.files&&inp.files[0];
    var cleanup=function(){ if(inp.parentNode) inp.parentNode.removeChild(inp); };
    if(!f){ cleanup(); return; }
    var r=new FileReader();
    r.onload=function(){
      cleanup();
      try{
        var obj=JSON.parse(r.result);
        if(!obj||!Array.isArray(obj.transactions)||!Array.isArray(obj.quickActions)||!Array.isArray(obj.rewards)) throw 0;
        modalConfirm({emoji:"⬆️",title:"Backup laden?",body:"Der aktuelle Stand wird durch das Backup ersetzt.",confirmLabel:"Laden",tone:"amber",onConfirm:function(){
          state=Object.assign({},DEFAULT,obj); save(); setupPWA(); render(); toast("✅ Backup geladen");
        }});
      }catch(e){ toast("Ungültige Backup-Datei"); }
    };
    r.onerror=function(){ cleanup(); toast("Datei konnte nicht gelesen werden"); };
    r.readAsText(f);
  });
  inp.click();
}

function viewHome(){
  var b=balance(), li=levelInfo(), st=streak(), et=earnedToday(), nr=nextReward();
  var deg=Math.round(li.prog*360);

  html+='<div style="margin-top:18px"><h2 class="sectiontitle">Sterne verdienen</h2>';

  var first=new Date(calY,calM,1); var lead=(first.getDay()+6)%7; var dim=new Date(calY,calM+1,0).getDate();

}

function emptyBox(e,t){ return '<div class="empty"><div class="e">'+e+'</div><p>'+t+'</p></div>'; }
function fmtDateTime(iso){ var d=new Date(iso); return d.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"})+" · "+d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}); }
function fmtDay(dk){
  if(dk===dayKey()) return "Heute";
  var y=new Date(); y.setDate(y.getDate()-1);
  if(dk===dayKey(y)) return "Gestern";
  return new Date(dk+"T12:00:00").toLocaleDateString("de-DE",{weekday:"long",day:"2-digit",month:"long"});
}

document.addEventListener("click",function(e){
  var el=e.target.closest("[data-action]"); if(!el) return;
  var a=el.getAttribute("data-action"), id=el.getAttribute("data-id");
  if(a==="navtab"){ var target=el.getAttribute("data-tab"); if(target==="aprovar"||target==="ajustes") requireUnlock(target); else { tab=target; render(); } }
  else if(a==="locktoggle"){ if(unlocked) lock(); else requireUnlock(tab); }
  else if(a==="locknow"){ lock(); }
  else if(a==="exportdata"){ exportData(); }
  else if(a==="importdata"){ importData(); }
  else if(a==="mute"){ state.muted=!state.muted; save(); render(); }
  else if(a==="quick"){ var q=state.quickActions.find(function(x){return x.id===id;}); if(q) addTx({emoji:q.emoji,label:q.label,points:q.points,kind:"earn"}); }
  else if(a==="custom"){ modalCustom(); }
  else if(a==="redeem"){ var r=state.rewards.find(function(x){return x.id===id;}); if(!r) return;
    if(unlocked) modalConfirm({emoji:r.emoji,title:r.name+" einlösen?",body:"Kostet "+r.cost+" Sterne. Neuer Stand: "+(balance()-r.cost)+" ⭐",confirmLabel:"Einlösen 🎉",tone:"amber",onConfirm:function(){redeem(r);}});
    else modalConfirm({emoji:r.emoji,title:r.name+" anfragen?",body:"Geht zur Freigabe. Kostet "+r.cost+" ⭐.",confirmLabel:"Anfragen 🙏",tone:"amber",onConfirm:function(){redeem(r);}}); }
  else if(a==="approve"){ approveTx(id); }
  else if(a==="reject"){ rejectTx(id); }
  else if(a==="approveall"){ var n=pendingTx().length; modalConfirm({emoji:"✅",title:"Alle freigeben?",body:"Gibt alle "+n+" offenen Einträge auf einmal frei.",confirmLabel:"Alle freigeben",tone:"amber",onConfirm:function(){approveAll();}}); }
  else if(a==="changepin"){ modalSetPin(function(){ unlocked=true; render(); }); }
  else if(a==="removepin"){ modalConfirm({emoji:"🚫",title:"PIN entfernen?",body:"Ohne PIN kann jeder den Erwachsenen-Modus auf diesem Gerät öffnen.",confirmLabel:"Entfernen",tone:"rose",onConfirm:function(){ state.pin=null; save(); render(); }}); }
  else if(a==="calprev"){ calM--; if(calM<0){calM=11;calY--;} render(); }
  else if(a==="calnext"){ calM++; if(calM>11){calM=0;calY++;} render(); }
  else if(a==="calday"){ var key=el.getAttribute("data-day"), s=parseInt(el.getAttribute("data-sum"),10)||0; var p=key.split("-"); var dl=p[2]+"."+p[1]+"."+p[0]; toast(s>0?(dl+": +"+s+" ⭐"):(dl+": keine Sterne")); }
  else if(a==="deltx"){ var t=state.transactions.find(function(x){return x.id===id;}); if(t) modalConfirm({emoji:"🗑️",title:"Diesen Eintrag löschen?",body:t.emoji+" "+t.label+" ("+(t.points>0?"+":"")+t.points+" ⭐)",confirmLabel:"Löschen",tone:"rose",onConfirm:function(){delTx(id);}}); }
  else if(a==="newq"){ modalItem("quick",null); }
  else if(a==="editq"){ var qq=state.quickActions.find(function(x){return x.id===id;}); if(qq) modalItem("quick",qq); }
  else if(a==="delq"){ delQuick(id); }
  else if(a==="newr"){ modalItem("reward",null); }
  else if(a==="editr"){ var rr=state.rewards.find(function(x){return x.id===id;}); if(rr) modalItem("reward",rr); }
  else if(a==="delr"){ delReward(id); }
  else if(a==="resethist"){ modalConfirm({emoji:"⚠️",title:"Gesamten Verlauf zurücksetzen?",body:"Das löscht alle Einträge und der Punktestand geht auf null. Aufgaben und Belohnungen bleiben.",confirmLabel:"Alles zurücksetzen",tone:"rose",onConfirm:function(){state.transactions=[];save();render();}}); }
});

function drawStar(x,cx,cy,spikes,outer,inner){
  var rot=Math.PI/2*3, step=Math.PI/spikes; x.beginPath(); x.moveTo(cx,cy-outer);
  for(var i=0;i<spikes;i++){ x.lineTo(cx+Math.cos(rot)*outer,cy+Math.sin(rot)*outer); rot+=step; x.lineTo(cx+Math.cos(rot)*inner,cy+Math.sin(rot)*inner); rot+=step; }
  x.lineTo(cx,cy-outer); x.closePath(); x.fill();
}
function rrect(x,X,Y,w,h,r){ x.beginPath(); x.moveTo(X+r,Y); x.arcTo(X+w,Y,X+w,Y+h,r); x.arcTo(X+w,Y+h,X,Y+h,r); x.arcTo(X,Y+h,X,Y,r); x.arcTo(X,Y,X+w,Y,r); x.closePath(); }
function makeIcon(size){
  var c=document.createElement("canvas"); c.width=c.height=size; var x=c.getContext("2d");
  var g=x.createLinearGradient(0,0,size,size); g.addColorStop(0,"#5eead4"); g.addColorStop(.5,"#22d3ee"); g.addColorStop(1,"#0a84ff");
  rrect(x,0,0,size,size,size*0.22); x.fillStyle=g; x.fill();
  x.fillStyle="#ffffff"; drawStar(x,size/2,size*0.52,5,size*0.30,size*0.14);
  return c.toDataURL("image/png");
}
function setupPWA(){
  try{
    var i180=makeIcon(180), i192=makeIcon(192), i512=makeIcon(512);
    setLink("apple-touch-icon",i180); setLink("icon",i180);
    var manifest={name:"Lukify's 🦖 Punkte",short_name:"Lukify",start_url:".",scope:".",display:"standalone",orientation:"portrait",background_color:"#14b8a6",theme_color:"#0ea5e9",lang:"de",
      icons:[{src:i192,sizes:"192x192",type:"image/png",purpose:"any maskable"},{src:i512,sizes:"512x512",type:"image/png",purpose:"any maskable"}]};
    var blob=new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"}); setManifest(URL.createObjectURL(blob));
  }catch(e){}
}
function setLink(rel,href){ var l=document.querySelector('link[rel="'+rel+'"]'); if(!l){ l=document.createElement("link"); l.rel=rel; document.head.appendChild(l); } l.href=href; }
function setManifest(href){ var l=document.querySelector('link[rel="manifest"]'); if(!l){ l=document.createElement("link"); l.rel="manifest"; document.head.appendChild(l); } l.href=href; }

state=load(); setupPWA(); render();
</script>
